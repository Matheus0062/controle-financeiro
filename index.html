<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1c5c4c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Meu Financeiro">
  <title>Controle Financeiro Pessoal</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <div class="summary-panel">
        <div class="summary-head">
          <div>
            <p class="eyebrow">Meu Financeiro</p>
            <h1>Resumo do mes</h1>
          </div>
          <span class="summary-pill">Planejamento ativo</span>
        </div>

        <div class="summary-grid">
          <label class="field-card">
            <span>Salario do mes</span>
            <input type="number" id="salaryInput" min="0" step="0.01" placeholder="0,00">
          </label>

          <label class="field-card">
            <span>Proventos extras</span>
            <input type="number" id="benefitsInput" min="0" step="0.01" placeholder="0,00">
          </label>

          <div class="result-card">
            <span>Total de entradas</span>
            <strong id="incomeTotal">R$ 0,00</strong>
          </div>

          <div class="result-card expense-highlight">
            <span>Total de gastos</span>
            <strong id="expenseTotal">R$ 0,00</strong>
          </div>

          <div class="result-card result-balance">
            <span>Saldo previsto</span>
            <strong id="balanceTotal">R$ 0,00</strong>
          </div>
        </div>

        <label class="note-card">
          <span>Anotacao</span>
          <input
            type="text"
            id="monthNote"
            value="Previsao de saldo para o mes de Maio"
            placeholder="Escreva uma observacao para o mes"
          >
        </label>
      </div>
    </section>

    <section class="month-planner">
      <div class="month-planner-head">
        <div class="month-planner-title">
          <p class="section-label">Meses do Ano</p>
          <h2>Planejamento mensal</h2>
        </div>

        <div class="year-switcher">
          <button id="previousYearButton" class="year-button" type="button" aria-label="Ano anterior">Anterior</button>
          <div class="year-display">
            <span>Ano ativo</span>
            <strong id="activeYearLabel">2026</strong>
          </div>
          <button id="nextYearButton" class="year-button" type="button" aria-label="Proximo ano">Proximo</button>
        </div>

        <div class="month-actions">
          <button id="exportBackupButton" class="ghost-button" type="button">Exportar backup</button>
          <button id="importBackupButton" class="secondary-button" type="button">Importar backup</button>
          <input id="importBackupInput" type="file" accept="application/json" hidden>
        </div>
      </div>

      <div id="monthTabs" class="month-tabs"></div>
    </section>

    <section class="toolbar">
      <div>
        <p class="section-label">Cartoes</p>
        <h2>Gastos por cartao</h2>
      </div>
      <button id="addCardButton" class="primary-button" type="button">Adicionar cartao</button>
    </section>

    <section id="cardsContainer" class="cards-grid"></section>
  </main>

  <template id="cardTemplate">
    <article class="finance-card">
      <div class="card-top">
        <div class="card-head">
          <div class="card-bank-line">
            <span class="card-bank-mark" aria-hidden="true"></span>
            <input class="card-name-input" type="text" value="Novo cartao" aria-label="Nome do cartao">
          </div>
          <p class="card-subtitle">Resumo do cartao no mes selecionado</p>
        </div>

        <div class="card-metrics" aria-live="polite">
          <span>Total no mes</span>
          <strong class="card-total-value">R$ 0,00</strong>
          <small class="card-count-value">0 gastos</small>
        </div>

        <div class="card-menu">
          <button class="card-menu-button" type="button" aria-label="Mais opcoes do cartao">...</button>
          <div class="card-menu-panel" hidden>
            <label class="card-menu-color-field">
              <span>Cor do card</span>
              <input class="card-color-input" type="color" value="#1f8a70" aria-label="Cor do card">
            </label>
            <button class="card-delete-button" type="button">Excluir cartao</button>
          </div>
        </div>

        <button class="card-collapse-button" type="button" aria-expanded="true">
          <span class="card-collapse-label">Recolher</span>
          <span class="card-collapse-icon" aria-hidden="true"></span>
        </button>
      </div>

      <div class="card-details">
        <div class="expense-list-header">
          <span>Descricao</span>
          <span>Valor</span>
          <span>Parcelas</span>
          <span>Recorrencia</span>
        </div>

        <div class="expenses-list"></div>

        <div class="card-actions">
          <button type="button" class="secondary-button add-expense-button">Adicionar gasto</button>
        </div>
      </div>
    </article>
  </template>

  <template id="expenseRowTemplate">
    <div class="expense-row">
      <div class="expense-summary">
        <div class="expense-summary-main">
          <strong class="expense-summary-description">Despesa sem descricao</strong>
          <span class="expense-badge">Gasto avulso</span>
        </div>

        <div class="expense-summary-side">
          <strong class="expense-summary-value">R$ 0,00</strong>
          <button class="edit-expense-button" type="button" aria-label="Editar gasto">
            <span aria-hidden="true">✎</span>
          </button>
        </div>
      </div>

      <div class="expense-editor">
        <label class="expense-field expense-description-field">
          <span>Descricao</span>
          <input class="expense-description" type="text" placeholder="Ex.: Mercado, combustivel, assinatura">
        </label>

        <div class="expense-editor-grid">
          <label class="expense-field expense-value-field">
            <span>Valor</span>
            <input class="expense-value" type="number" min="0" step="0.01" placeholder="0,00">
          </label>

          <label class="expense-field expense-installments-field">
            <span>Parcelas</span>
            <input class="expense-installments" type="number" min="1" max="12" step="1" value="1">
          </label>
        </div>

        <label class="expense-fixed-toggle">
          <span>Recorrencia</span>
          <span class="expense-fixed-toggle-control">
            <input class="expense-fixed" type="checkbox">
            <span>Fixo todo mes</span>
          </span>
        </label>

        <div class="expense-editor-actions">
          <button class="remove-expense-button" type="button" aria-label="Remover gasto">Remover</button>
          <button class="done-expense-button" type="button">Concluir</button>
        </div>
      </div>
    </div>
  </template>

  <script src="script.js"></script>
</body>
</html>
